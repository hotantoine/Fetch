services:
  - type: web
    runtime: node
    name: ig-fetch
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: "0.0.0.0"
      - key: APP_PASSWORD
        sync: false
      - key: IG_COOKIE
        sync: false
      - key: CREATORCRAWL_API_KEY
        sync: false
